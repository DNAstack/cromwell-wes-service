name: Build & Test Java App

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: 21
      java-distribution:
        required: false
        type: string
        default: corretto
    secrets:
      pat-with-read-packages-permission:
        required: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: maven
      - name: Set up Maven's settings.xml
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{
              "id": "github",
              "username": "$GITHUB_ACTOR",
              "password": "${{ secrets.pat-with-read-packages-permission }}"
            }]
          githubServer: false
      - name: Build with Maven
        run: mvn -B --update-snapshots verify
