global:
  cloud:
    clusterName:
    clusterNamespace:
    spaceDnsName:
    gcloud:
      project:
    region:
    zone:
  database:
    postgres:
      instance:
      version:
      internalHost:   # in-cluster postgres hostname, defaults to "postgres"
  image:
    repository:
    secretName:
  ingressRoutes:
    enabled:
  instrumentation:
    env:

image:
  secretName:   # image pull secret for GCP artifact registry
  repository:   # docker repository to pull images from

ingressRoute:
  enabled:   # boolean; per-env global-values.yaml flips this on once ready to cut over ingress

app:
  configVersion: config-version
  secretHash: secrets-hash
  memoryLimit: "2048Mi"
  replicas: 1
  rbac:
    # false: @PreAuthorize endpoints enforce coarse wes:* actions; true: enforce fine workbench.runs.* actions.
    # Each environment flips this in helm/<env>/global-values.yaml once its consumer grants carry the fine actions.
    fineGrainedEnforcementEnabled: false
  spring:
    additionalProfiles: ""

  # Pre-configured GCP credentials secrets. These must exist in the cluster before
  # deploying. Defaults match the workspaces-wes-* naming used by cloud-init.
  gcpCredentialsSecretName: workspaces-wes-gcp-credentials

  cromwell:
    imageVersion: "89"   # broadinstitute/cromwell image tag
    saSecretName: workspaces-wes-cromwell-credentials      # GCP SA for Cromwell to access GCS
    dbCredentialsSecretName: workspaces-wes-cromwell-db-credentials  # created by cloud-init (APP_NAME=workspaces-wes)
    gcpExecutionProject: ""   # GCP project where Cromwell batch jobs run (e.g. ardent-window-817)
    gcpBucket: ""             # GCS bucket for Cromwell outputs (e.g. gs://my-wes-bucket)
    gcpStagingLocation: ""    # GCS staging location for WES blob storage
    gcpZone: "us-central1-a"  # GCP zone for Cromwell batch jobs
    cromwellUrl: "http://localhost:8000"  # in-pod URL to the Cromwell sidecar

workspacesWes:
  appName:
wallet:
  appName:

database:
  postgresVersion:
  postgresInstance:

cloud:
  clusterNamespace:
  clusterName:
  spaceDnsName:

env: []   # extra env merged into main container via mergeEnvLists

test:
  keepalive:
    enabled: false
    # Must exceed test runtime (currently ~7 min) to give Concourse time to exec
    # artifacts out of the test pod. Longer windows silently block helm test reruns.
    duration: 600
