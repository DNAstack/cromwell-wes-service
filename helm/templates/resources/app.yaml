# ==============================================================================
# workspaces-wes client credentials (Secret + WalletClient)
# ==============================================================================
{{- $clientSecretObj := (lookup "v1" "Secret" .Release.Namespace "workspaces-wes-client-credentials") | default dict }}
{{- if or (empty $clientSecretObj)
          (and
            (hasKey $clientSecretObj.metadata "annotations")
            (hasKey $clientSecretObj.metadata.annotations "meta.helm.sh/release-name")
            (eq (get $clientSecretObj.metadata.annotations "meta.helm.sh/release-name") .Release.Name))
}}
apiVersion: v1
kind: Secret
metadata:
  name: workspaces-wes-client-credentials
  labels:
    app: cromwell-wes-service
    type: app_wallet-client-credential
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- $clientSecretData := (get $clientSecretObj "data") | default dict }}
  {{- $clientSecret := (get $clientSecretData "clientSecret") | default (randBytes 32 | b64dec | printf "%x" | b64enc) }}
  clientId: {{ b64enc "workspaces-wes" | quote }}
  clientSecret: {{ $clientSecret | quote }}
{{- end }}

---

# ==============================================================================
# workspaces-wes-public client credentials (Secret + WalletClient)
# Used by ewes-service for device_code flows.
# ==============================================================================
{{- $publicSecretObj := (lookup "v1" "Secret" .Release.Namespace "workspaces-wes-public-client-credentials") | default dict }}
{{- if or (empty $publicSecretObj)
          (and
            (hasKey $publicSecretObj.metadata "annotations")
            (hasKey $publicSecretObj.metadata.annotations "meta.helm.sh/release-name")
            (eq (get $publicSecretObj.metadata.annotations "meta.helm.sh/release-name") .Release.Name))
}}
apiVersion: v1
kind: Secret
metadata:
  name: workspaces-wes-public-client-credentials
  labels:
    app: cromwell-wes-service
    type: app_wallet-client-credential
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- $publicSecretData := (get $publicSecretObj "data") | default dict }}
  {{- $publicSecret := (get $publicSecretData "clientSecret") | default (randBytes 32 | b64dec | printf "%x" | b64enc) }}
  clientId: {{ b64enc "workspaces-wes-public" | quote }}
  clientSecret: {{ $publicSecret | quote }}
{{- end }}

---

# ==============================================================================
# workspaces-wes-cromwell-db-credentials
# Password is generated once on first install and preserved on upgrades via
# helm.sh/resource-policy: keep. Cloud-init reads this secret and creates the
# Cromwell Postgres user with the stored password. Cromwell container reads these
# credentials at startup via CROMWELL_DB_USER / CROMWELL_DB_PASSWORD env vars.
# Must match APP_NAME=workspaces-wes used by the cloud-init script.
# ==============================================================================
{{- $cromwellDbSecretObj := (lookup "v1" "Secret" .Release.Namespace "workspaces-wes-cromwell-db-credentials") | default dict }}
{{- if or (empty $cromwellDbSecretObj)
          (and
            (hasKey $cromwellDbSecretObj.metadata "annotations")
            (hasKey $cromwellDbSecretObj.metadata.annotations "meta.helm.sh/release-name")
            (eq (get $cromwellDbSecretObj.metadata.annotations "meta.helm.sh/release-name") .Release.Name))
}}
apiVersion: v1
kind: Secret
metadata:
  name: workspaces-wes-cromwell-db-credentials
  labels:
    app: cromwell-wes-service
    type: cromwell-db-credential
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- $cromwellDbSecretData := (get $cromwellDbSecretObj "data") | default dict }}
  {{- $cromwellDbPassword := (get $cromwellDbSecretData "password") | default (randBytes 32 | b64dec | printf "%x" | b64enc) }}
  username: {{ b64enc "cromwell" | quote }}
  password: {{ $cromwellDbPassword | quote }}
{{- end }}

---

# ==============================================================================
# WalletClient: workspaces-wes
# ==============================================================================
apiVersion: dnastack.com/v1
kind: WalletClient
metadata:
  name: workspaces-wes
  labels:
    app: cromwell-wes-service
spec:
  syncMode: CREATE_AND_UPDATE
  clientSecrets:
    - credentialId: default
      syncMode: CREATE_ONLY
      secretKeyRef:
        name: workspaces-wes-client-credentials
        key: clientSecret
    - credentialId: rotation-backup
      syncMode: CREATE_ONLY
      secretKeyRef:
        name: workspaces-wes-client-credentials
        key: clientSecret
  data:
    id: workspaces-wes
    name: "OAuth client for workspaces-wes"
    grants:
      - audience: '{{- include "dnastack.workspacesWes.externalUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: wes

---

# ==============================================================================
# WalletClient: workspaces-wes-public
# Public client used by ewes-service for device_code flows.
# ==============================================================================
apiVersion: dnastack.com/v1
kind: WalletClient
metadata:
  name: workspaces-wes-public
  labels:
    app: cromwell-wes-service
spec:
  syncMode: CREATE_AND_UPDATE
  clientSecrets:
    - credentialId: default
      syncMode: CREATE_ONLY
      secretKeyRef:
        name: workspaces-wes-public-client-credentials
        key: clientSecret
    - credentialId: rotation-backup
      syncMode: CREATE_ONLY
      secretKeyRef:
        name: workspaces-wes-public-client-credentials
        key: clientSecret
  data:
    id: workspaces-wes-public
    name: "Public OAuth client for workspaces-wes (device code flows)"
    grants:
      - audience: '{{- include "dnastack.workspacesWes.externalUrl" . }}'
        # sensitive: true is load-bearing here — these scopes appear in the device_code consent UI
        grantTypes:
          - "urn:ietf:params:oauth:grant-type:device_code"
          - refresh_token
        responseTypes:
          - code
          - token
        scopes:
          - name: wes
          - name: offline_access
          - name: openid
            sensitive: true
          - name: profile
            sensitive: true
          - name: email
            sensitive: true

---

# ==============================================================================
# WalletPolicy: workspaces-wes-policy
# ==============================================================================
apiVersion: dnastack.com/v1
kind: WalletPolicy
metadata:
  name: workspaces-wes-policy
  labels:
    app: cromwell-wes-service
spec:
  syncMode: CREATE_AND_UPDATE
  data:
    id: workspaces-wes-policy
    name: Access Policy for workspaces-wes
    statements:
      - principals:
          - type: service
            id: workspaces-wes
          - type: service
            id: workspaces-wes-e2e-test
          - type: group
            id: dnastack-devs-external
        actions:
          - wes:runs:read
          - wes:runs:write
          - wes:runs:cancel
          - wes:execute
        resources:
          - uri: '{{- include "dnastack.workspacesWes.externalUrl" . }}/'
